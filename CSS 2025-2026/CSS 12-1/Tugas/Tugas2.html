<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absolute</title>
    <style>
      .container {
        position: relative;
        width: 300px;
        height: 300px;
        background-color: lightgray;
      }
      .box {
        position: absolute;
        left: 50px;
        top: 50px;
        background-color: coral;
        width: 100px;
        height: 100px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Absolute Box</div>
    </div>
  </body>
</html>
