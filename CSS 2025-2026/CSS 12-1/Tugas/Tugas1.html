<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relative</title>
    <style>
      .box {
        position: relative;
        left: 80px;
        top: 60px;
        background-color: lightblue;
        width: 150px;
        height: 150px;
      }
      .box1 {
        position: relative;
        left: 160px;
        top: 60px;
        background-color: lightcoral;
        width: 150px;
        height: 150px;
      }
      .box2 {
        position: relative;
        left: 240px;
        top: 60px;
        background-color: lightgreen;
        width: 150px;
        height: 150px;
      }
    </style>
  </head>
  <body>
    <div class="box">Relative Box</div>
    <div class="box1">Relative Box 1</div>
    <div class="box2">Relative Box 2</div>
  </body>
</html>
