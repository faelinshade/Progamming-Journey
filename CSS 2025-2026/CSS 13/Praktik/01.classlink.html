<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pseudo link</title>
    <style>
      .hello:link {
        color: orange;
      }
      .hello:visited {
        color: green;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 20px;
      }
      .hello:active {
        font-style: italic;
      }
      .hello:visited {
        color: red;
      }
    </style>
  </head>
  <body>
    <a href="#" class="hello">Hello World</a>
    <ul>
      <li><a href="#" class="hello">Link 1</a></li>
      <li><a href="#" class="hello">Link 2</a></li>
      <li><a href="#" class="hello">Link 3</a></li>
      <li><a href="#" class="hello">Link 4</a></li>
      <li><a href="#" class="hello">Link 5</a></li>
    </ul>
  </body>
</html>
