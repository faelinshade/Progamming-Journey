<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas</title>
    <style>
      .solid {
        border: 3px solid blue;
        padding: 10px;
        background-color: aqua;
      }
      .dotted {
        border: 3px dotted red;
        padding: 10px;
        background-color: pink;
      }
      .double {
        border: 5px double green;
        padding: 10px;
        background-color: lightgreen;
      }
      .groove {
        border: 3px groove purple;
        padding: 10px;
        background-color: plum;
      }
      .dashed {
        border: 3px dashed orange;
        padding: 10px;
        background-color: lightyellow;
      }
      .ridge {
        border: 5px ridge gray;
        padding: 10px;
        background-color: lightgray;
      }
    </style>
  </head>
  <body>
    <p class="solid">ini border solid</p>
    <p class="dotted">ini border dotted</p>
    <p class="double">ini border double</p>
    <p class="groove">ini border groove</p>
    <p class="dashed">ini border dashed</p>
    <p class="ridge">ini border ridge</p>
  </body>
</html>
