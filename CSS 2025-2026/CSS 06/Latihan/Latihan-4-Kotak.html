<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4 Kotak</title>
    <style>
      .solid {
        border: 3px solid black;
        padding: 10px;
        margin: 10px;
      }
      .double {
        border: 3px double blue;
        padding: 10px;
        margin: 10px;
      }
      .groove {
        border: 3px groove green;
        padding: 10px;
        margin: 10px;
      }
      .ridge {
        border: 3px ridge red;
        padding: 10px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <div class="solid">Kotak Solid</div>
    <div class="double">Kotak Double</div>
    <div class="groove">Kotak Groove</div>
    <div class="ridge">Kotak Ridge</div>
  </body>
</html>
