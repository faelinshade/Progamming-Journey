<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Tugas Background Image</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-image: url("Nebula.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        font-family: Arial, sans-serif;
      }

      .konten {
        text-align: center;
        padding: 100px 20px;
      }

      h1 {
        color: white;
        font-size: 3em;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        margin-bottom: 20px;
      }

      p {
        color: white;
        font-size: 1.2em;
        text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="konten">
      <h1>Mau diulang seribu kalipun</h1>
      <p>aku akan tetap memilihmu</p>
    </div>
  </body>
</html>
